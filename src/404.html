<p>○ &nbsp;lost signal — retuning…<br><br><a href="./">back to the broadcast</a></p>
<script>
  // The site routes with hashes (/#/shows), so a direct hit on e.g. /shows
  // lands here — bounce it to the matching hash route on the homepage.
  var base = "/hospital-radio/"; // ← change to "/" if the site moves to a custom domain
  if (location.pathname.indexOf(base) !== 0) base = "/";
  var rest = location.pathname.slice(base.length).replace(/\/+$/, "");
  location.replace(base + (rest ? "#/" + rest : ""));
</script>
